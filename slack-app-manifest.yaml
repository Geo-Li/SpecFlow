_metadata:
  major_version: 1

display_information:
  name: SpecFlow
  description: Slack-driven development automation — plan, implement, and PR.

features:
  bot_user:
    display_name: SpecFlow
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - im:history
      - im:read
      - im:write
      - channels:history

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
